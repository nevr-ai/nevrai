<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0a0a0a"/>
  <!-- 31 small squares representing subsystems, grid layout -->
  <g transform="translate(120,80)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="44" y="0" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="88" y="0" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="132" y="0" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="176" y="0" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="220" y="0" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="264" y="0" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="308" y="0" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <!-- Row 2 -->
    <rect x="0" y="44" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="44" y="44" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
