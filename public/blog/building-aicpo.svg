    <rect x="0" y="132" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="44" y="132" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="88" y="132" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="132" y="132" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
