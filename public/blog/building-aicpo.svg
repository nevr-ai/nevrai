    <rect x="176" y="44" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="220" y="44" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="264" y="44" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="308" y="44" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <!-- Row 3 -->
    <rect x="0" y="88" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="44" y="88" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="88" y="88" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="132" y="88" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
    <rect x="176" y="88" width="32" height="32" rx="4" fill="#18181b" stroke="#27272a"/>
