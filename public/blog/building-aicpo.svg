  <!-- Arrow from person to grid -->
  <circle cx="540" cy="160" r="24" fill="none" stroke="#a1a1aa" stroke-width="1.5"/>
  <line x1="540" y1="136" x2="540" y2="120" stroke="#a1a1aa" stroke-width="1.5"/>
  <line x1="540" y1="184" x2="540" y2="220" stroke="#a1a1aa" stroke-width="1.5"/>
  <line x1="516" y1="200" x2="540" y2="184" stroke="#a1a1aa" stroke-width="1.5"/>
  <line x1="564" y1="200" x2="540" y2="184" stroke="#a1a1aa" stroke-width="1.5"/>
  <!-- Arrow -->
  <line x1="490" y1="160" x2="460" y2="160" stroke="#22c55e" stroke-width="2"/>
  <polygon points="462,155 452,160 462,165" fill="#22c55e"/>
  <!-- Label -->
  <text x="400" y="320" fill="#a1a1aa" font-family="monospace" font-size="14" text-anchor="middle">31 subsystem &middot; 1 person &middot; 0 manual code</text>
