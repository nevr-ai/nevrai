<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <rect width="600" height="500" fill="#0a0a0a"/>
  <!-- Pipeline vertical -->
  <g transform="translate(80,40)">
    <!-- CEO -->
    <rect x="0" y="0" width="440" height="50" rx="8" fill="#18181b" stroke="#27272a" stroke-width="2"/>
    <text x="220" y="32" fill="#a1a1aa" font-family="monospace" font-size="16" text-anchor="middle">CEO → decompose task</text>
    <!-- Arrow -->
    <line x1="220" y1="50" x2="220" y2="80" stroke="#27272a" stroke-width="2"/>
    <polygon points="213,76 220,88 227,76" fill="#27272a"/>
    <!-- Builder -->
    <rect x="0" y="90" width="440" height="50" rx="8" fill="#18181b" stroke="#22c55e" stroke-width="2"/>
    <text x="220" y="122" fill="#22c55e" font-family="monospace" font-size="16" text-anchor="middle">Builder → code + test</text>
    <!-- Arrow -->
    <line x1="220" y1="140" x2="220" y2="170" stroke="#27272a" stroke-width="2"/>
    <polygon points="213,166 220,178 227,166" fill="#27272a"/>
    <!-- Quality -->
    <rect x="0" y="180" width="440" height="50" rx="8" fill="#18181b" stroke="#27272a" stroke-width="2"/>
    <text x="220" y="212" fill="#a1a1aa" font-family="monospace" font-size="16" text-anchor="middle">Quality → independent review</text>
    <!-- Retry loop -->
    <path d="M440,205 L470,205 L470,115 L440,115" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="490" y="165" fill="#22c55e" font-family="monospace" font-size="11" text-anchor="start">retry</text>
    <text x="490" y="180" fill="#22c55e" font-family="monospace" font-size="11" text-anchor="start">if FAIL</text>
    <!-- Arrow -->
    <line x1="220" y1="230" x2="220" y2="260" stroke="#27272a" stroke-width="2"/>
    <polygon points="213,256 220,268 227,256" fill="#27272a"/>
    <!-- Deploy -->
    <rect x="0" y="270" width="440" height="50" rx="8" fill="#18181b" stroke="#27272a" stroke-width="2"/>
    <text x="220" y="302" fill="#a1a1aa" font-family="monospace" font-size="16" text-anchor="middle">Deploy → verify</text>
  </g>
  <!-- Rules -->
  <g transform="translate(80,380)">
    <text x="0" y="0" fill="#3f3f46" font-family="monospace" font-size="13">P1: delegate</text>
    <text x="120" y="0" fill="#3f3f46" font-family="monospace" font-size="13">P2: queue</text>
    <text x="230" y="0" fill="#3f3f46" font-family="monospace" font-size="13">Q1: test gate</text>
    <text x="360" y="0" fill="#3f3f46" font-family="monospace" font-size="13">S1: context</text>
  </g>
  <text x="300" y="440" fill="#a1a1aa" font-family="monospace" font-size="16" text-anchor="middle">15 roles · 40+ rules · quality gates</text>
  <text x="300" y="468" fill="#22c55e" font-family="monospace" font-size="14" text-anchor="middle">rules make agents reliable</text>
</svg>
