  <text x="340" y="295" fill="#22c55e" font-family="monospace" font-size="11" transform="rotate(90,340,295)">evidence trail</text>
  <!-- Bottom -->
  <text x="300" y="440" fill="#a1a1aa" font-family="monospace" font-size="16" text-anchor="middle">14 node types · 18 edge types</text>
