  <text x="300" y="212" fill="#22c55e" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.7">central</text>
  <!-- Surrounding nodes -->
  <circle cx="140" cy="100" r="28" fill="#18181b" stroke="#27272a" stroke-width="2"/>
