  <circle cx="400" cy="50" r="22" fill="#18181b" stroke="#27272a" stroke-width="1.5"/>
  <text x="400" y="54" fill="#a1a1aa" font-family="monospace" font-size="11" text-anchor="middle">feature</text>
  <!-- Edges -->
  <line x1="268" y1="180" x2="165" y2="120" stroke="#27272a" stroke-width="1.5"/>
  <line x1="332" y1="180" x2="435" y2="120" stroke="#27272a" stroke-width="1.5"/>
  <line x1="270" y1="215" x2="125" y2="260" stroke="#27272a" stroke-width="1.5"/>
