<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <rect width="600" height="500" fill="#0a0a0a"/>
  <!-- Correct path (fading) -->
  <g transform="translate(60,60)">
    <circle cx="30" cy="30" r="20" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
    <text x="30" y="35" fill="#22c55e" font-family="monospace" font-size="11" text-anchor="middle">start</text>
    <line x1="50" y1="30" x2="100" y2="30" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
    <circle cx="120" cy="30" r="16" fill="#18181b" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <line x1="136" y1="30" x2="180" y2="30" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <circle cx="200" cy="30" r="16" fill="#18181b" stroke="#22c55e" stroke-width="1" opacity="0.2"/>
    <text x="260" y="35" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.3">correct path</text>
  </g>
  <!-- Error branch (growing) -->
  <g transform="translate(60,60)">
    <!-- Fork point -->
    <line x1="50" y1="40" x2="100" y2="80" stroke="#ef4444" stroke-width="2"/>
    <!-- Error chain - getting bolder -->
    <circle cx="120" cy="100" r="16" fill="#18181b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="120" y="104" fill="#ef4444" font-family="monospace" font-size="9" text-anchor="middle">err</text>
    <line x1="136" y1="100" x2="180" y2="130" stroke="#ef4444" stroke-width="2"/>
    <circle cx="200" cy="140" r="18" fill="#18181b" stroke="#ef4444" stroke-width="2"/>
    <text x="200" y="144" fill="#ef4444" font-family="monospace" font-size="9" text-anchor="middle">fix?</text>
    <line x1="218" y1="145" x2="260" y2="170" stroke="#ef4444" stroke-width="2.5"/>
    <circle cx="280" cy="180" r="20" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2.5"/>
    <text x="280" y="184" fill="#ef4444" font-family="monospace" font-size="9" text-anchor="middle">worse</text>
    <line x1="300" y1="185" x2="340" y2="210" stroke="#ef4444" stroke-width="3"/>
    <circle cx="360" cy="220" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="3"/>
    <text x="360" y="216" fill="#ef4444" font-family="monospace" font-size="10" text-anchor="middle">even</text>
    <text x="360" y="230" fill="#ef4444" font-family="monospace" font-size="10" text-anchor="middle">worse</text>
    <!-- Spiral -->
    <line x1="382" y1="228" x2="420" y2="255" stroke="#ef4444" stroke-width="3.5" opacity="0.8"/>
    <circle cx="440" cy="270" r="26" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="3.5"/>
    <text x="440" y="274" fill="#ef4444" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">crash</text>
  </g>
  <!-- Weight labels -->
  <g transform="translate(60,340)">
    <text x="0" y="0" fill="#a1a1aa" font-family="monospace" font-size="13">error weight in context:</text>
    <rect x="200" y="-14" width="30" height="16" rx="3" fill="#ef4444" opacity="0.15"/>
    <rect x="240" y="-14" width="40" height="16" rx="3" fill="#ef4444" opacity="0.25"/>
    <rect x="290" y="-14" width="50" height="16" rx="3" fill="#ef4444" opacity="0.35"/>
    <rect x="350" y="-14" width="60" height="16" rx="3" fill="#ef4444" opacity="0.5"/>
    <rect x="420" y="-14" width="70" height="16" rx="3" fill="#ef4444" opacity="0.7"/>
    <text x="260" y="30" fill="#a1a1aa" font-family="monospace" font-size="11">each fix attempt adds weight to wrong reasoning</text>
  </g>
  <!-- Bottom -->
  <text x="300" y="430" fill="#e4e4e7" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">the longer the chain, the harder to escape</text>
  <text x="300" y="458" fill="#22c55e" font-family="monospace" font-size="13" text-anchor="middle">solution: reset context, not retry</text>
</svg>
