<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <rect width="600" height="500" fill="#0a0a0a"/>
  <!-- Human side -->
  <g transform="translate(80,60)">
    <circle cx="60" cy="50" r="40" fill="none" stroke="#a1a1aa" stroke-width="2"/>
    <circle cx="60" cy="38" r="14" fill="none" stroke="#a1a1aa" stroke-width="1.5"/>
    <path d="M28,80 Q60,62 92,80" fill="none" stroke="#a1a1aa" stroke-width="1.5"/>
    <text x="60" y="120" fill="#a1a1aa" font-family="monospace" font-size="14" text-anchor="middle">human</text>
    <text x="60" y="145" fill="#3f3f46" font-family="monospace" font-size="11" text-anchor="middle">forgets</text>
    <text x="60" y="162" fill="#3f3f46" font-family="monospace" font-size="11" text-anchor="middle">gets tired</text>
    <text x="60" y="179" fill="#3f3f46" font-family="monospace" font-size="11" text-anchor="middle">rushes</text>
    <text x="60" y="196" fill="#3f3f46" font-family="monospace" font-size="11" text-anchor="middle">skips rules</text>
  </g>
  <!-- ≈ sign -->
  <text x="300" y="110" fill="#22c55e" font-family="monospace" font-size="48" text-anchor="middle">=</text>
  <!-- AI side -->
  <g transform="translate(380,60)">
    <rect x="20" y="10" width="80" height="80" rx="16" fill="none" stroke="#a1a1aa" stroke-width="2"/>
    <text x="60" y="58" fill="#a1a1aa" font-family="monospace" font-size="18" text-anchor="middle">AI</text>
    <text x="60" y="120" fill="#a1a1aa" font-family="monospace" font-size="14" text-anchor="middle">synthetic</text>
    <text x="60" y="145" fill="#3f3f46" font-family="monospace" font-size="11" text-anchor="middle">loses context</text>
    <text x="60" y="162" fill="#3f3f46" font-family="monospace" font-size="11" text-anchor="middle">degrades</text>
    <text x="60" y="179" fill="#3f3f46" font-family="monospace" font-size="11" text-anchor="middle">cuts corners</text>
    <text x="60" y="196" fill="#3f3f46" font-family="monospace" font-size="11" text-anchor="middle">reads diagonally</text>
  </g>
  <!-- Bottom: optimal team -->
  <g transform="translate(100,300)">
    <rect x="0" y="0" width="400" height="100" rx="12" fill="#18181b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="200" y="30" fill="#22c55e" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">optimal: human + AI + error budget</text>
    <text x="200" y="55" fill="#a1a1aa" font-family="monospace" font-size="12" text-anchor="middle">plan for failures, not perfection</text>
    <text x="200" y="78" fill="#a1a1aa" font-family="monospace" font-size="12" text-anchor="middle">verification loops + fresh context + human judgment</text>
  </g>
  <text x="300" y="460" fill="#a1a1aa" font-family="monospace" font-size="14" text-anchor="middle">the best teams treat AI as a brilliant but fallible colleague</text>
</svg>
